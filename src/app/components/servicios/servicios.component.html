<section id="servicios">
  <div class="container">

    <div class="section-head">
      <div>
        <span class="eyebrow">Lo que hacemos</span>
        <h2>Todo lo que tu equipo necesita para no parar.</h2>
      </div>
    </div>

    <div class="services-grid">

      <div class="service-card fade-up" *ngFor="let service of servicios">

        <div class="service-icon">
          <i [class]="service.icon"></i>
        </div>

        <h3>{{ service.title }}</h3>

        <p>{{ service.desc }}</p>

      </div>

    </div>

  </div>
</section>
