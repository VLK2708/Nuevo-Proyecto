<header class="navbar">
  <div class="nav-inner">
    <a href="#" class="logo">
      <span class="logo-mark">
        <svg viewBox="0 0 48 48" width="30" height="30" aria-hidden="true">
          <path d="M6 10 L18 34 L24 22 L18 10 Z" fill="url(#g1)"/>
          <path d="M24 22 L30 34 L36 10 L30 10 Z" fill="url(#g2)"/>
          <path d="M38 10 L38 34 L44 34 L44 10 Z" fill="url(#g2)"/>
          <defs>
            <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#1AA65D"/>
              <stop offset="1" stop-color="#0F7A43"/>
            </linearGradient>
            <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#1C6FB0"/>
              <stop offset="1" stop-color="#0B2A4A"/>
            </linearGradient>
          </defs>
        </svg>
      </span>
      <span class="logo-text">Suministros <em>&</em> Servicios</span>
    </a>

    <nav class="nav-links">
      <a href="#servicios">Servicios</a>
      <a href="#renta">Renta</a>
      <a href="#productos">Productos</a>
      <a href="#nosotros">Nosotros</a>
      <a href="#contacto" class="nav-cta">Contáctanos</a>
    </nav>

    <button class="menu-toggle" (click)="toggleMenu()" aria-label="Abrir menú">
      <span></span><span></span><span></span>
    </button>
  </div>

  <div class="mobile-menu" [class.open]="menuOpen">
    <a href="#servicios" (click)="closeMenu()">Servicios</a>
    <a href="#renta" (click)="closeMenu()">Renta</a>
    <a href="#productos" (click)="closeMenu()">Productos</a>
    <a href="#nosotros" (click)="closeMenu()">Nosotros</a>
    <a href="#contacto" (click)="closeMenu()">Contáctanos</a>
  </div>
</header>
